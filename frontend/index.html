<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARDD Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .alert-new { @apply bg-blue-900 border-blue-500; }
        .alert-spoof { @apply bg-red-900 border-red-500; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 shadow-lg flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">NARDD <span class="text-sm font-normal text-gray-400">| Network Monitor</span></h1>
            <span id="advanced-badge" class="hidden bg-red-900/40 text-red-400 text-[10px] px-2 py-0.5 rounded border border-red-800 font-mono">ADVANCED MODE</span>
        </div>
        <div id="connection-status" class="flex items-center space-x-2">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                <span id="status-dot" class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
            </span>
            <span id="status-text" class="text-sm text-gray-400">Disconnected</span>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Main Content (Devices Table) -->
        <div class="flex-1 p-6 overflow-auto">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center space-x-4">
                    <h2 class="text-xl font-semibold">Detected Devices</h2>
                    <select id="interface-select" class="bg-gray-800 border border-gray-700 text-xs rounded px-2 py-1 text-gray-400 focus:outline-none focus:border-indigo-500">
                        <option value="">Default Interface</option>
                    </select>
                </div>
                <div class="space-x-2">
                    <button id="scan-btn" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-md transition text-sm font-semibold">Scan Network</button>
                    <button id="refresh-btn" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-md transition text-sm">Refresh List</button>
                </div>
            </div>
            
            <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-2xl">
                <table class="min-w-full text-left">
                    <thead class="bg-gray-700/50 text-gray-400 text-sm uppercase">
                        <tr>
                            <th class="px-6 py-4">MAC Address</th>
                            <th class="px-6 py-4">IP Address</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4">Last Seen</th>
                            <th class="px-6 py-4">Action</th>
                        </tr>
                    </thead>
                    <tbody id="device-table-body" class="divide-y divide-gray-700">
                        <!-- Devices will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Sidebar (Live Alerts) -->
        <aside class="w-96 bg-gray-800 border-l border-gray-700 flex flex-col">
            <div class="p-4 border-b border-gray-700 flex items-center justify-between">
                <div class="flex space-x-4">
                    <button id="live-tab-btn" class="text-sm font-bold text-indigo-400 border-b-2 border-indigo-400 pb-1">LIVE</button>
                    <button id="history-tab-btn" class="text-sm font-bold text-gray-400 hover:text-gray-200 pb-1">HISTORY</button>
                </div>
                <span id="alert-count" class="bg-red-600 text-white text-[10px] px-1.5 py-0.5 rounded-full">0</span>
            </div>
            
            <!-- Live Alerts Container -->
            <div id="live-alerts-container" class="flex-1 overflow-y-auto p-4 space-y-3">
                <!-- Live alerts show here -->
            </div>

            <!-- History Alerts Container (Hidden by default) -->
            <div id="history-alerts-container" class="hidden flex-1 overflow-y-auto p-4 space-y-3 bg-gray-900/50">
                <!-- Past alerts from DB show here -->
            </div>
        </aside>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
